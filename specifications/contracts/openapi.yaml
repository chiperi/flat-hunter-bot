openapi: 3.1.0
info:
  title: flat-hunter-bot — NO inbound HTTP API
  version: 1.0.0
  description: >-
    Цей бот НЕ надає HTTP-сервісу: він лише робить вихідні виклики (Telegram Bot API long polling +
    сайти оголошень) і не відкриває жодного вхідного порту. OpenAPI-контракту експонованого API нема
    (навмисно). Зовнішні HTTP-контракти, які бот СПОЖИВАЄ:
      - DOM.RIA developer API: GET /dom/search (id-и, newest-first), GET /dom/info/{id} (деталі);
        авторизація ?api_key=…; ціна фільтрується price_from/price_to (грн-еквівалент).
      - Telegram Bot API: getUpdates (long polling), sendMessage / sendPhoto, setMyCommands.
    Асинхронні повідомлення (команди/сповіщення) описані в asyncapi.yaml.
paths: {}
