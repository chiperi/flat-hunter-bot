asyncapi: 3.0.0
info:
  title: flat-hunter-bot — Telegram messaging
  version: 1.0.0
  description: >-
    Асинхронний контракт бота: вхідні команди від користувача та вихідні сповіщення про оголошення.
    Транспорт — Telegram Bot API (long polling). Немає брокера черг; це модель форми повідомлень.

channels:
  commands:
    address: telegram.command
    description: Вхідні команди (лише від користувачів з ALLOWED_USER_IDS; інакше — ввічлива відмова).
    messages:
      command:
        payload:
          type: object
          properties:
            command:
              type: string
              enum: [start, help, newsearch, mysearches, pause, resume, forgetme, cancel]
            userId: { type: integer }
            args: { type: string, description: "напр. id профілю для /pause /resume" }

  notification:
    address: telegram.notification
    description: Вихідні сповіщення про нове/змінене оголошення (фото + HTML-підпис).
    messages:
      newListing:
        name: NewListing
        payload:
          $ref: '#/components/schemas/ListingAlert'
      priceChange:
        name: PriceChange
        payload:
          allOf:
            - $ref: '#/components/schemas/ListingAlert'
            - type: object
              properties:
                oldPrice: { type: [integer, "null"] }

operations:
  receiveCommand:
    action: receive
    channel: { $ref: '#/channels/commands' }
  sendNewListing:
    action: send
    channel: { $ref: '#/channels/notification' }
  sendPriceChange:
    action: send
    channel: { $ref: '#/channels/notification' }

components:
  schemas:
    ListingAlert:
      type: object
      description: Одне оголошення, нормалізоване до спільної форми (Listing).
      required: [source, id, title, price, currency, url, isBusiness]
      properties:
        source: { type: string, enum: [domria, rieltor] }
        id: { type: string, description: "id у межах джерела; глобально — source:id" }
        title: { type: string }
        price:
          type: [integer, "null"]
          description: "у ГРН; null = «Ціна договірна» (такі у вибірку не потрапляють)"
        currency: { type: string, const: "грн" }
        area: { type: [number, "null"], description: "м²" }
        rooms: { type: [integer, "null"] }
        city: { type: string }
        district: { type: [string, "null"] }
        url: { type: string, format: uri }
        imageUrl: { type: [string, "null"] }
        isBusiness: { type: boolean, description: "true = ріелтор/агенція; false = власник" }
